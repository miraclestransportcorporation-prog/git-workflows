name: Main Branch Automation

on:
  pull_request:        # Fixed: must be pull_request
    branches:
      - main           # This ensures it ONLY runs on PRs targeting the main branch

jobs:
  build-and-deploy:
    runs-on: self-hosted  # <--- Change this from ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Sync Files
        run: |
          rsync -avz --exclude '.git' . /var/www/html/