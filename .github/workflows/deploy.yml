name: Main Branch Automation

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Web Root
        run: |
          # We use 'cp' because 'rsync' is not installed on this host.
          # -r: recursive, -p: preserve permissions
          # We copy the current directory (.) to the web root.
          cp -rp . /var/www/html/
          
          # Clean up the .git metadata from the live web folder for security
          rm -rf /var/www/html/.git