name: Main Branch Automation

on:
  # Trigger 1: Runs when a Pull Request is opened or updated against main
  pull_request:
    branches:
      - main
  
  # Trigger 2: Runs when code is actually merged (pushed) into main
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # Use 'self-hosted' since we are deploying to your specific server
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify HTML Files
        run: |
          echo "Processing HTML files..."
          ls *.html

      - name: Deploy to Web Root
        # Using 'sudo' here because we saw earlier your user needs it for /var/www/html
        run: |
          sudo cp -rp ./* /var/www/html/
          sudo rm -rf /var/www/html/.git