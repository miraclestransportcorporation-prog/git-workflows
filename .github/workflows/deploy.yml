name: Main Branch Automation

on:
  pull_request:        # Fixed: must be pull_request
    branches:
      - main           # This ensures it ONLY runs on PRs targeting the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Verify HTML Files
        run: |
          echo "Processing HTML files in the main branch..."
          ls *.html